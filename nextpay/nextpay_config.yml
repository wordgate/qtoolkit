# NextPay Configuration
# Add to your main config.yml

nextpay:
  # API access key (required)
  # Sent as the X-Access-Key header on every request.
  # Obtain from the NextPay dashboard.
  access_key: "YOUR_NEXTPAY_ACCESS_KEY"

  # API endpoint (optional, defaults to production)
  # endpoint: "https://pay.arbella.group"

  # Request timeout in seconds (optional, default: 30)
  # timeout: 30

# Usage Examples:
#
#   // One-time payment ($9.99)
#   result, err := nextpay.CreateOrder(&nextpay.OrderRequest{
#       UserID:      "user123",
#       Email:       "user@example.com",
#       ProductName: "Premium",
#       Amount:      999, // in cents
#   })
#
#   // Subscription checkout (plan referenced by its stable code)
#   result, err := nextpay.CreateSubscription(&nextpay.SubscriptionRequest{
#       UserID: "user123",
#       Email:  "user@example.com",
#       Code:   "pro-monthly",
#   })
#
#   // Grant a comped subscription (no first payment; idempotent)
#   g, err := nextpay.GrantSubscription(&nextpay.GrantSubscriptionRequest{
#       UserID:         "user123",
#       Code:           "pro-monthly",
#       IdempotencyKey: "grant-2026-07-01-user123-pro",
#   })
#
#   // Plan management (CRUD)
#   plans, err := nextpay.ListPlans(false /* includeInactive */)
#   plan,  err := nextpay.CreatePlan(&nextpay.CreatePlanRequest{
#       Code: "pro-monthly", Name: "Pro", Amount: 999, IntervalType: "month",
#   })
#   err = nextpay.UpdatePlan("pro-monthly", &nextpay.UpdatePlanRequest{ /* ... */ })
#   err = nextpay.DeletePlan("pro-monthly")
#
#   // Query
#   subs, err := nextpay.GetSubscriptions("user123")
#   sub,  err := nextpay.GetSubscription("sub_uuid")
#
#   // Usage-based (post-paid) billing
#   nextpay.CreatePendingCharge(&nextpay.PendingChargeRequest{
#       SubscriptionID: "sub_uuid",
#       Amount:         500,
#       Description:    "API usage",
#   })
#
#   // Auto-recharge contract
#   nextpay.CreateRechargeContract(&nextpay.RechargeContractRequest{
#       UserID:        "user123",
#       Email:         "user@example.com",
#       DefaultAmount: 10000, // in cents
#       OrderUUID:     "ord_uuid",
#   })

# Supported Payment Methods:
# - Credit Card (Visa/Mastercard/Amex) - supports auto-renewal
# - Alipay - manual renewal
# - WeChat Pay - manual renewal

# Testing:
# Use Stripe test card: 4242 4242 4242 4242
# Any future expiry date, any 3-digit CVC

# Security Notes:
# - Never commit real API keys to version control
