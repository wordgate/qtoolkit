# FastGPT Configuration Template
# Add this to your main config.yml file

fastgpt:
  # Application-specific API key (includes AppId)
  # Create at: FastGPT Dashboard → App → API Access
  api_key: "YOUR_FASTGPT_API_KEY"

  # FastGPT server base URL (self-hosted or cloud)
  base_url: "https://your-fastgpt.com"

# Security Notes:
# - Never commit real API keys to version control
# - Use app-specific keys (not global keys) for chat endpoints
# - Rotate API keys regularly

# Usage:
#   # Text only
#   result, err := fastgpt.Chat(ctx, "conv-id", fastgpt.Text("你好"))
#
#   # Text + image
#   result, err := fastgpt.Chat(ctx, "conv-id",
#       fastgpt.Text("这个界面怎么操作"),
#       fastgpt.ImageURL("https://s3.example.com/screenshot.png"),
#   )
#
#   # Check similarity for human handoff
#   if result.Similarity < 0.7 {
#       // transfer to human agent
#   }
